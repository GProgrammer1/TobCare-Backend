name: Deploy Backend

on:
  push:
    branches: [main]

env:
  IMAGE: georgio123/tobcare-backend

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Migrate & Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/tobcare

            # Pull latest backend image
            docker pull georgio123/tobcare-backend:${{ needs.build-and-push.outputs.image_tag }}

            # Update image tag in compose file
            sed -i 's|image: georgio123/tobcare-backend:.*|image: georgio123/tobcare-backend:${{ needs.build-and-push.outputs.image_tag }}|' docker-compose.prod.yml

            # Run Prisma migrations inside the new image (uses .env.production on host)
            docker compose -f docker-compose.prod.yml run --rm --no-deps backend pnpm prisma:migrate:deploy

            # Restart backend (redis stays up)
            docker compose -f docker-compose.prod.yml up -d --no-deps backend

            # Clean up old images
            docker image prune -f
