name: Deploy Backend

on:
  push:
    branches: [main]

env:
  IMAGE: georgio123/tobcare-backend

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  migrate:
    name: Run Prisma Migrations
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Generate Prisma client (needs schema only, not a live DB)
      - name: Generate Prisma client
        run: pnpm prisma:generate
        env:
          DATABASE_URL: "postgresql://x:x@localhost:5432/x"
          REDIS_URL: "redis://localhost:6379"
          CORS_ORIGIN: "http://localhost"
          CORS_METHODS: "GET,POST"
          CORS_CREDENTIALS: "true"
          OTP_TTL_SECONDS: "300"
          HMAC_SECRET: "build-placeholder"
          JWT_SECRET: "build-placeholder"

      # Run migrations against production RDS
      - name: Deploy migrations to RDS
        run: pnpm prisma:migrate:deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: "redis://localhost:6379"
          CORS_ORIGIN: "http://localhost"
          CORS_METHODS: "GET,POST"
          CORS_CREDENTIALS: "true"
          OTP_TTL_SECONDS: "300"
          HMAC_SECRET: "build-placeholder"
          JWT_SECRET: "build-placeholder"

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [build-and-push, migrate]
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/tobcare

            # Pull latest backend image
            docker pull georgio123/tobcare-backend:${{ needs.build-and-push.outputs.image_tag }}

            # Write the image tag for compose
            sed -i 's|image: georgio123/tobcare-backend:.*|image: georgio123/tobcare-backend:${{ needs.build-and-push.outputs.image_tag }}|' docker-compose.prod.yml

            # Restart backend (redis stays up)
            docker compose -f docker-compose.prod.yml up -d --no-deps backend

            # Clean up old images
            docker image prune -f
