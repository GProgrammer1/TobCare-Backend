name: E2E Patient

on:
  push:
    branches: [feat/**]
  pull_request:
    branches: [dev]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: rm -rf generated/prisma && pnpm exec prisma generate
        env:
          NODE_ENV: test
      - run: |
          echo '{"name":"@tobcare/prisma","version":"0.0.0","private":true,"main":"./client.ts","types":"./client.ts"}' > generated/prisma/package.json

      - name: Run e2e tests
        run: |
          trap 'pnpm test:down' EXIT
          pnpm test:up
          EXIT=0
          pnpm test:patient || EXIT=$?
          exit $EXIT
